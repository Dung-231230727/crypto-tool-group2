<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mã Vigenere – Nhóm 2</title>
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <script src="/js/script.js"></script>
</head>

<body class="d-flex">
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <main class="main-content">
        <!-- Mobile Header -->
        <header class="mobile-header d-lg-none">
            <button class="btn btn-link text-dark p-0" onclick="toggleSidebar()">
                <i class="ti ti-menu-2 fs-1"></i>
            </button>
            <span class="fw-bold fs-3 text-dark">Vigenere</span>
            <div style="width: 32px;"></div>
        </header>

        <div class="p-4 p-lg-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                    <div>
                        <span class="badge-custom mb-2 d-inline-block">Mật mã cổ điển</span>
                        <h2 class="fw-bold mb-1">Mã Vigenere</h2>
                        <p class="text-muted mb-0">Hệ mã hóa thay thế đa bảng chữ cái sử dụng từ khóa.</p>
                    </div>
            </div>

            <div class="row g-4">
                <div class="col-xl-4 col-lg-5 col-12">
                    <div class="card card-crypto">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Cấu hình</h5>
                                <button type="button"
                                    class="btn btn-sm btn-link text-primary text-decoration-none fw-bold p-0"
                                    onclick="useSampleData()">
                                    <i class="ti ti-magic-wand me-1"></i>Dữ liệu mẫu
                                </button>
                            </div>

                            <form th:action="@{/vigenere}" th:object="${request}" method="post">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Văn bản</label>
                                    <textarea class="form-control font-monospace" th:field="*{text}" id="inputText"
                                        rows="3" placeholder="Nhập văn bản..." required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Khóa (Key)</label>
                                    <input type="text" class="form-control font-monospace" th:field="*{key}"
                                        id="inputKey" placeholder="Ví dụ: LEHONGPHONG" required />
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Kiểu khóa</label>
                                    <select class="form-select" th:field="*{keyType}" id="inputKeyType">
                                        <option value="REPEATING">Lặp khóa (Repeating Key)</option>
                                        <option value="AUTOKEY">Tự động khóa (Autokey)</option>
                                    </select>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Chế độ</label>
                                    <div class="btn-group w-100">
                                        <input type="radio" class="btn-check" th:field="*{mode}" value="ENCRYPT"
                                            id="mode-enc" checked>
                                        <label class="btn btn-outline-primary" for="mode-enc">Mã hóa</label>
                                        <input type="radio" class="btn-check" th:field="*{mode}" value="DECRYPT"
                                            id="mode-dec">
                                        <label class="btn btn-outline-primary" for="mode-dec">Giải mã</label>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100 py-2">Thực thi</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7">
                    <div th:if="${response != null}">
                        <div th:if="${response.errorMessage != null}"
                            class="alert alert-danger border-0 shadow-sm mb-4">
                            <i class="ti ti-alert-circle me-2"></i> <span th:text="${response.errorMessage}"></span>
                        </div>

                        <div th:if="${response.result != null}">
                            <div class="card card-crypto mb-4 border-primary">
                                <div class="card-body p-4">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="small fw-bold text-uppercase text-muted"
                                            th:text="${response.mode == 'ENCRYPT' ? 'Kết quả Mã hóa' : 'Kết quả Giải mã'}"></span>
                                        <button class="btn btn-sm btn-outline-secondary rounded-pill"
                                            th:data-value="${response.result}"
                                            onclick="navigator.clipboard.writeText(this.dataset.value)">Sao
                                            chép</button>
                                    </div>
                                    <div class="fs-2 fw-bold font-monospace text-primary text-break"
                                        th:text="${response.result}"></div>
                                </div>
                            </div>

                            <div th:if="${not #lists.isEmpty(response.transcript)}">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold mb-0 small text-uppercase text-muted">Chi tiết các bước thực hiện
                                    </h6>
                                    <button class="btn btn-sm btn-link text-primary text-decoration-none p-0"
                                        onclick="copyTranscript()">
                                        <i class="ti ti-copy me-1"></i>Sao chép các bước
                                    </button>
                                </div>
                                <div class="transcript-container" id="transcript-box">
                                    <div th:each="line : ${response.transcript}" th:text="${line}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${response == null}" class="py-5 text-center text-muted">
                        <i class="ti ti-loader text-light mb-3 d-block" style="font-size: 3rem;"></i>
                        Nhập dữ liệu và cấu hình để bắt đầu tính toán.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function useSampleData() {
            document.getElementById('inputText').value = 'ANTOANBAOMATTHONGTIN';
            document.getElementById('inputKey').value = 'ATTT';
            document.getElementById('mode-enc').checked = true;
            document.getElementById('inputKeyType').value = 'REPEATING';
        }

        function copyTranscript() {
            const box = document.getElementById('transcript-box');
            if (box) {
                // Get text and replace double newlines from the div-per-line structure
                const text = box.innerText;
                navigator.clipboard.writeText(text);
                alert('Đã sao chép các bước thực hiện!');
            }
        }
    </script>
</body>

</html>
