<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="sidebar" class="sidebar d-flex flex-column flex-shrink-0 p-4 shadow-sm">
        <!-- Floating Toggle Button (Desktop) -->
        <button class="sidebar-toggle-btn d-none d-lg-flex" onclick="toggleSidebar()" title="Thu gọn / Mở rộng">
            <i class="ti ti-chevron-left"></i>
        </button>

        <div class="d-flex align-items-center justify-content-between mb-1">
            <a href="/" class="d-flex align-items-center text-decoration-none text-dark">
                <i class="ti ti-shield-check fs-2 text-primary me-2"></i>
                <span class="fs-4 fw-bold text-dark text-nowrap">Crypto Tool</span>
            </a>
            <!-- Mobile Close Button -->
            <button class="btn btn-link text-muted p-0 d-lg-none" onclick="toggleSidebar()">
                <i class="ti ti-x fs-2"></i>
            </button>
        </div>
        <div class="text-muted small text-uppercase fw-semibold mb-4 ms-1" style="letter-spacing:1px">Ngô Văn Dũng</div>
        
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-home fs-5 me-3"></i> <span>Trang chủ</span>
                </a>
            </li>
            <li class="mt-4 mb-2 ms-1 text-muted small fw-bold text-uppercase">Công cụ</li>
            
            <li class="nav-item">
                <a href="/classical" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-history fs-5 me-3"></i> <span>Mã hóa cổ điển</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="/modulo" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-math-function fs-5 me-3"></i> <span>Toán học Modulo</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="/aes" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-binary fs-5 me-3"></i> <span>Thuật toán AES</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="/des" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-lock fs-5 me-3"></i> <span>Thuật toán DES</span>
                </a>
            </li>
            
            <li class="nav-item">
                <a href="/public-key" class="nav-link d-flex align-items-center text-dark py-2 px-3 rounded-2">
                    <i class="ti ti-users fs-5 me-3"></i> <span>Mã hóa công khai</span>
                </a>
            </li>
        </ul>
        
        <div class="px-2 mt-4 small text-muted opacity-50">
            Phiên bản 1.0.0
        </div>
    </div>
</body>
</html>
